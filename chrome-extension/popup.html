<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marusso Parfum</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 360px;
      min-height: 200px;
      background: #fff;
      color: #111;
    }
    header {
      background: #7C3AED;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 15px; font-weight: 700; }
    header p { font-size: 10px; opacity: 0.8; margin-top: 1px; }
    .body { padding: 16px; }

    /* ── Estado vazio ── */
    .empty { text-align: center; padding: 30px 16px; color: #888; font-size: 13px; }
    .empty .icon { font-size: 36px; margin-bottom: 8px; }

    /* ── Preview do produto ── */
    .product-preview {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      background: #f8f8f8;
      border-radius: 10px;
      padding: 10px;
    }
    .product-preview img { width: 64px; height: 64px; object-fit: contain; border-radius: 6px; background: white; }
    .product-info { flex: 1; min-width: 0; }
    .product-info .name { font-size: 12px; font-weight: 600; line-clamp: 2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .product-info .price { font-size: 16px; font-weight: 800; color: #7C3AED; margin-top: 4px; }
    .product-info .brand { font-size: 10px; color: #888; text-transform: uppercase; }

    /* ── Formulário ── */
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 11px; font-weight: 600; color: #555; margin-bottom: 4px; }
    input, select {
      width: 100%; padding: 8px 10px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 12px; outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #7C3AED; }

    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: #7C3AED; color: white; }
    .btn-primary:hover { background: #6D28D9; }
    .btn-primary:disabled { background: #c4b5fd; cursor: not-allowed; }
    .btn-secondary { background: #f3f3f3; color: #444; margin-top: 8px; font-size: 12px; }

    .status { text-align: center; font-size: 12px; padding: 8px; border-radius: 8px; margin-top: 10px; display: none; }
    .status.success { background: #d1fae5; color: #065f46; display: block; }
    .status.error { background: #fee2e2; color: #991b1b; display: block; }

    /* ── Configurações ── */
    .settings-btn { background: none; border: none; cursor: pointer; font-size: 18px; margin-left: auto; padding: 2px 6px; }
    .settings-panel { display: none; padding: 16px; border-top: 1px solid #f0f0f0; }
    .settings-panel.open { display: block; }

    .tabs { display: flex; gap: 4px; margin-bottom: 14px; }
    .tab { flex: 1; padding: 8px; border: 1px solid #e5e5e5; border-radius: 8px; background: white; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; }
    .tab.active { background: #7C3AED; color: white; border-color: #7C3AED; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>🌸 Marusso Parfum</h1>
      <p>Importador de produtos ML</p>
    </div>
    <button class="settings-btn" id="settingsBtn" title="Configurações">⚙️</button>
  </header>

  <!-- Configurações (oculto por padrão) -->
  <div class="settings-panel" id="settingsPanel">
    <div class="field">
      <label>URL da API do site</label>
      <input type="url" id="apiUrl" placeholder="https://marusso-parfum.vercel.app" />
    </div>
    <div class="field">
      <label>API Secret (gerado no setup)</label>
      <input type="password" id="apiSecret" placeholder="cole o secret aqui" />
    </div>
    <button class="btn btn-primary" id="saveSettings">Salvar configurações</button>
    <div class="status" id="settingsStatus"></div>
  </div>

  <!-- Corpo principal -->
  <div class="body" id="mainBody">
    <!-- Estado: sem produto capturado -->
    <div class="empty" id="emptyState">
      <div class="icon">🛒</div>
      <p><strong>Abra uma página de produto</strong> no Mercado Livre e clique no botão roxo <em>"Adicionar ao Marusso"</em> que aparece na tela.</p>
    </div>

    <!-- Estado: produto capturado -->
    <div id="productState" style="display:none">
      <div class="product-preview">
        <img id="prevImg" src="" alt="" />
        <div class="product-info">
          <div class="brand" id="prevBrand"></div>
          <div class="name" id="prevName"></div>
          <div class="price" id="prevPrice"></div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="add">Adicionar</button>
        <button class="tab" data-tab="details">Detalhes</button>
      </div>

      <!-- Aba: adicionar -->
      <div id="tabAdd">
        <div class="field">
          <label>Seu link de afiliado (meli.la/...)</label>
          <input type="url" id="affiliateLink" placeholder="https://meli.la/XXXXXX" />
        </div>
        <div class="field">
          <label>Categoria</label>
          <select id="gender">
            <option value="unissex">Unissex</option>
            <option value="feminino">Feminino</option>
            <option value="masculino">Masculino</option>
          </select>
        </div>
        <div class="field">
          <label>Badge (opcional)</label>
          <input type="text" id="badge" placeholder="MAIS VENDIDO, NOVO, PREMIUM..." />
        </div>
        <button class="btn btn-primary" id="addBtn">➕ Adicionar ao site</button>
        <button class="btn btn-secondary" id="clearBtn">✖ Limpar / Capturar outro</button>
      </div>

      <!-- Aba: detalhes capturados -->
      <div id="tabDetails" style="display:none">
        <div class="field">
          <label>Nome (editável)</label>
          <input type="text" id="editName" />
        </div>
        <div class="field">
          <label>Preço (R$)</label>
          <input type="number" id="editPrice" step="0.01" />
        </div>
        <div class="field">
          <label>Preço original (R$, opcional)</label>
          <input type="number" id="editOriginal" step="0.01" />
        </div>
        <div class="field">
          <label>Marca</label>
          <input type="text" id="editBrand" />
        </div>
      </div>

      <div class="status" id="mainStatus"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
